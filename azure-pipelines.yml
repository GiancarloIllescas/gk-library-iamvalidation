# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

pool:
  vmImage: 'windows-latest'
  name: 'Agentes_Compilacion'


variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  major: 1
  minor: 0
  NUGET_ENABLE_LEGACY_CSPROJ_PACK: true

name: $(major).$(minor)$(Rev:.rr)

steps:
- task: NuGetToolInstaller@1
- task: NuGetCommand@2
  inputs:
    command: 'restore'
    restoreSolution: '**/*.sln'
    feedsToUse: 'select'
    vstsFeed: '80c17264-11a0-4f4d-98e0-86e0e5e465ce/6ce4fc23-bb30-4cb1-88e4-f2cddcf380d9'
    includeNuGetOrg: false
  displayName: 'Install nuget'

- task: NuGetCommand@2
  displayName: 'Restore nuget packages'
  inputs:
    restoreSolution: '$(solution)'

- task: NuGetCommand@2
  inputs:
    command: 'restore'
    restoreSolution: '**/*.sln'
    feedsToUse: 'select'
    vstsFeed: '80c17264-11a0-4f4d-98e0-86e0e5e465ce/6ce4fc23-bb30-4cb1-88e4-f2cddcf380d9'


- task: VSBuild@1
  displayName: 'Build'
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Create nupkgs'
  inputs:
    command: 'pack'
    packagesToPack: 'src/Yape.Library.IamValidation/*.csproj'
    versioningScheme: byBuildNumber

- task: DotNetCoreCLI@2
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
    nuGetFeedType: 'internal'
    publishVstsFeed: '80c17264-11a0-4f4d-98e0-86e0e5e465ce/6ce4fc23-bb30-4cb1-88e4-f2cddcf380d9'